# Per-app build config consumed by .github/workflows/build-images.yml.
# Each app under apps/{owner}/{name}/build/ may have this file alongside
# its Dockerfile. The workflow reads it to know what platforms to build
# for and which build args to thread through.
#
# Image path convention (NOT configurable per-app):
#   ghcr.io/solcreek/grove-apps/{owner}/{name}:{version}
# The owner/name segment mirrors the manifest slug so two projects
# sharing a name (different forks) can coexist in the registry.
#
# schema_version: pin to detect breaking changes in build.yaml shape
#                 independently of the manifest schema_version.

schema_version: "0.2"

# Slug must match the parent manifest's slug.
slug: pocketbase/pocketbase
version: "0.39.0"

platforms:
  - linux/amd64
  - linux/arm64

# Threaded into `docker buildx build --build-arg`.
build_args:
  PB_VERSION: "0.39.0"

context: .
dockerfile: Dockerfile
