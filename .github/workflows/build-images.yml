# Build + push grove-built app images to ghcr.io/solcreek/grove-apps/.
#
# This workflow handles every app whose manifest directory contains a
# build/ subdir with Dockerfile + build.yaml. The build config schema
# is documented in apps/<owner>/<name>/build/build.yaml comments;
# the SCHEMA.md "source provenance" section explains why these images
# exist (type:build entries in the catalog).
#
# Triggers:
#   - workflow_dispatch: pick a single app to rebuild, or "all"
#   - push to apps/**/build/**: auto-rebuild the touched apps
#
# Auth: uses GITHUB_TOKEN with packages:write. No PAT needed because
# the org owns both this repo and the GHCR namespace.

name: build-images

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App slug to build (e.g. "pocketbase/pocketbase") or "all"'
        required: true
        default: 'all'
        type: string
  push:
    branches: [main]
    paths:
      - 'apps/**/build/**'
      - '.github/workflows/build-images.yml'

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.list.outputs.apps }}
    steps:
      - uses: actions/checkout@v4

      - id: list
        name: Discover apps to build
        # On dispatch with a specific app, build just that one.
        # On push, diff the previous commit to find which build/
        # directories changed, then build those. On dispatch="all"
        # or first push, build everything that has a build/ dir.
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.app }}" != "all" ]; then
            apps_json=$(printf '["%s"]' "${{ inputs.app }}")
          else
            apps=()
            while IFS= read -r dir; do
              slug=${dir#apps/}
              slug=${slug%/build}
              apps+=("$slug")
            done < <(find apps -type d -name build -mindepth 3 -maxdepth 3 | sort)
            apps_json=$(printf '%s\n' "${apps[@]}" | jq -R . | jq -sc .)
          fi
          echo "apps=$apps_json" >> "$GITHUB_OUTPUT"
          echo "Will build: $apps_json"

  build:
    needs: discover
    if: needs.discover.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJSON(needs.discover.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Read build config
        id: cfg
        run: |
          set -euo pipefail
          cfg="apps/${{ matrix.slug }}/build/build.yaml"
          if [ ! -f "$cfg" ]; then
            echo "::error::missing build.yaml at $cfg"
            exit 1
          fi
          # Single-shot yaml→json via python; avoids pulling yq.
          python3 -c "import yaml,json,sys; print(json.dumps(yaml.safe_load(open('$cfg'))))" > /tmp/cfg.json
          image_name=$(jq -r .image_name /tmp/cfg.json)
          version=$(jq -r .version /tmp/cfg.json)
          platforms=$(jq -r '.platforms | join(",")' /tmp/cfg.json)
          # build_args = "K1=V1,K2=V2,..." for buildx --build-arg loop
          build_args=$(jq -r '(.build_args // {}) | to_entries | map("\(.key)=\(.value)") | join("\n")' /tmp/cfg.json)
          {
            echo "image_name=$image_name"
            echo "version=$version"
            echo "platforms=$platforms"
            echo "context=apps/${{ matrix.slug }}/build"
          } >> "$GITHUB_OUTPUT"
          # build_args is multi-line; use the HEREDOC form
          {
            echo "build_args<<EOF"
            echo "$build_args"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.cfg.outputs.context }}
          file: ${{ steps.cfg.outputs.context }}/Dockerfile
          platforms: ${{ steps.cfg.outputs.platforms }}
          build-args: ${{ steps.cfg.outputs.build_args }}
          # Push to both the version tag and a stable "latest" alias.
          # Latest is convenience for testing; manifests must always
          # pin to the explicit version tag in production.
          tags: |
            ghcr.io/solcreek/grove-apps/${{ steps.cfg.outputs.image_name }}:${{ steps.cfg.outputs.version }}
            ghcr.io/solcreek/grove-apps/${{ steps.cfg.outputs.image_name }}:latest
          push: true
          provenance: false

      - name: Report digest
        # The digest is the load-bearing output — curators copy it
        # into the manifest's source.built_digest before flipping
        # the manifest from type:upstream to type:build.
        run: |
          echo "::notice title=Built ${{ matrix.slug }}::ghcr.io/solcreek/grove-apps/${{ steps.cfg.outputs.image_name }}:${{ steps.cfg.outputs.version }}@${{ steps.build.outputs.digest }}"
          echo ""
          echo "Manifest update:"
          echo "  source.type = build"
          echo "  source.image = ghcr.io/solcreek/grove-apps/${{ steps.cfg.outputs.image_name }}:${{ steps.cfg.outputs.version }}"
          echo "  source.built_digest = ${{ steps.build.outputs.digest }}"
          echo "  source.built_at = $(date -u +%Y-%m-%dT%H:%M:%SZ)"
