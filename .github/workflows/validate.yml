# Catalog QA — three layers run in parallel on every PR:
#
#   layer-1-2  Go validator: schema, slug/path consistency,
#              registry cross-refs, image availability via HEAD.
#              Catches typos + dead tags. Fast (seconds).
#
#   layer-3    Container smoke test: actually `docker run` each
#              app, wait for its port to listen, probe the
#              health_check path, expect 2xx or 3xx. Catches "the
#              container exits immediately" / "wrong port declared"
#              / "permission denied on data volume" — the bug class
#              we hit with gitea. ~1 min wall clock for the catalog
#              in matrix-parallel form.
#
# Run on every PR + push to main.

name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Layer 1 + 2 — structure + image availability ──────────────
  layer-1-2:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.list.outputs.apps }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Validate (schema + image availability)
        run: go run ./cmd/validate

      - name: Unit tests
        run: go test ./cmd/validate/... -count=1

      # Emit a JSON list of slugs for the smoke matrix to fan out
      # over. Use the validator's view (parses registry.json) rather
      # than listing apps/ directly so disabled apps never get smoked.
      - id: list
        name: List apps for smoke matrix
        run: |
          set -euo pipefail
          apps=$(jq -c '.apps' registry.json)
          echo "apps=$apps" >> "$GITHUB_OUTPUT"
          echo "Will smoke: $apps"

  # ── Layer 3 — container smoke for every app in the registry ──
  layer-3:
    needs: layer-1-2
    if: needs.layer-1-2.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJSON(needs.layer-1-2.outputs.apps) }}
    steps:
      - uses: actions/checkout@v6

      - name: Read manifest + assemble env flags
        id: cfg
        run: |
          set -euo pipefail
          mf="apps/${{ matrix.slug }}/manifest.json"

          # Multi-service apps (Plausible-style: postgres + clickhouse +
          # app) need depends_on orchestration this single-`docker run`
          # smoke can't do. They opt out via smoke_test.skip; the run
          # surfaces "skipped" so a left-out app stays visible.
          if [ "$(jq -r '.smoke_test.skip // false' "$mf")" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Dispatch by schema_version. v0.2 had top-level
          # image/env/ports/health_check; v0.3 nested them under
          # services[] and added ${secret.X} / ${grove.public_url}
          # interpolation in env values. The smoke can only run one
          # container, so v0.3 picks the PRIMARY service (the one
          # with a port marked public:true — grove's PrimaryService
          # logic in Go).
          schema_ver=$(jq -r '.schema_version // "0.1"' "$mf")
          case "$schema_ver" in
            0.3*)
              primary=$(jq -c 'first(.services[] | select(.ports[]?.public == true))' "$mf")
              if [ -z "$primary" ] || [ "$primary" = "null" ]; then
                echo "::error::v0.3 manifest has no service with public:true port"
                exit 1
              fi
              image=$(echo "$primary" | jq -r .image)
              port=$(echo "$primary" | jq -r 'first(.ports[] | select(.public == true) | .container)')
              # v0.3 structured health probe. type=http → use path;
              # type=cmd → harder to translate to an HTTP probe so
              # fall back to / and let the curl polling decide.
              health=$(echo "$primary" | jq -r 'if .health.type == "http" then .health.http.path else "/" end // "/"')
              raw_env=$(echo "$primary" | jq -c '.env // {}')
              ;;
            *)
              # v0.2 path — kept for backward compat with any fork
              # that hasn't migrated to v0.3 yet. The official catalog
              # has migrated everything; this branch is a safety net.
              image=$(jq -r .image "$mf")
              port=$(jq -r '.ports[0].container' "$mf")
              health=$(jq -r '.health_check // "/"' "$mf")
              raw_env=$(jq -c '.env // {}' "$mf")
              ;;
          esac

          # Generate per-secret random values. base64 of 32 bytes
          # (44 chars) satisfies both common shapes apps check:
          # minimum-length string AND Base64-encoded N bytes.
          # Persisted in a temp file so the env-substitution step
          # below sees the same values.
          : > /tmp/secrets.env
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            val=$(openssl rand -base64 32)
            echo "${name}=${val}" >> /tmp/secrets.env
          done < <(jq -r '.secrets // [] | .[].name' "$mf")

          # Build env flags from the (possibly v0.3) env block.
          # v0.3 env values may contain ${secret.NAME} and
          # ${grove.public_url} interpolation; substitute both here
          # before passing to docker run. ${grove.public_url}
          # resolves to the same http://localhost:<port> grove uses
          # at install time. Other ${X.Y} forms (${user.X},
          # ${grove.old_public_url}) are unsupported in smoke and
          # pass through as literals (broken-by-design; if a
          # manifest needs user_inputs, it should set smoke_test.skip).
          env_flags=""
          while IFS=$'\t' read -r k v; do
            # Substitute ${secret.NAME}
            while IFS='=' read -r sname sval; do
              [ -z "$sname" ] && continue
              v="${v//\$\{secret.$sname\}/$sval}"
            done < /tmp/secrets.env
            # Substitute ${grove.public_url}
            v="${v//\$\{grove.public_url\}/http://localhost:$port}"
            # Each value must be single-shell-quoted because env
            # values commonly contain spaces, '@', '/', '$' from
            # connection strings and the like.
            esc=${v//\'/\'\\\'\'}
            env_flags="$env_flags -e ${k}='${esc}'"
          done < <(echo "$raw_env" | jq -r 'to_entries[] | "\(.key)\t\(.value)"')

          # Auto-inject secret values as plain env vars too. v0.2
          # apps relied on grove doing this implicitly (no
          # interpolation syntax existed); v0.3 apps use explicit
          # ${secret.X} but some treat the secret name + env var
          # name as the same string (e.g. linkding's
          # LD_SUPERUSER_PASSWORD secret IS the env var) and
          # would otherwise fail to receive a value.
          secret_flags=""
          while IFS='=' read -r sname sval; do
            [ -z "$sname" ] && continue
            secret_flags="$secret_flags -e ${sname}='${sval}'"
          done < /tmp/secrets.env

          # smoke_test.extra_env applies ONLY during this automated
          # run, not at grove install. Used by apps with boot-time
          # safety checks grove satisfies via real volumes (e.g.
          # vaultwarden's I_REALLY_WANT_VOLATILE_STORAGE guard).
          smoke_env=$(jq -r '.smoke_test.extra_env // {} | to_entries | map("-e \(.key)=\(.value|@sh)") | join(" ")' "$mf")

          {
            echo "image=$image"
            echo "port=$port"
            echo "health=$health"
            echo "env_flags=$env_flags"
            echo "smoke_env=$smoke_env"
            echo "secret_flags=$secret_flags"
          } >> "$GITHUB_OUTPUT"

      - name: Skipped (smoke_test.skip true — e.g. multi-service)
        if: steps.cfg.outputs.skip == 'true'
        run: echo "::notice::${{ matrix.slug }} opted out of Layer 3 via smoke_test.skip — usually multi-service / external-dep apps"

      - name: docker pull
        if: steps.cfg.outputs.skip != 'true'
        run: docker pull "${{ steps.cfg.outputs.image }}"

      - name: Run container + probe
        if: steps.cfg.outputs.skip != 'true'
        # --network host so the container's port appears directly on
        # the runner's loopback — same shape as grove's --net=host
        # invocation in the dew VM. Health check accepts any 2xx or
        # 3xx; many apps redirect / to a setup wizard which is fine.
        # Boot timeout 90s — covers heavy apps (nextcloud, plausible).
        # NO --rm: we want the dead container around so the logs
        # step below can surface the real startup failure.
        run: |
          set -euo pipefail
          NAME="probe-${{ matrix.slug }}"
          NAME=${NAME//\//-}
          eval docker run -d --name "$NAME" --network host \
            ${{ steps.cfg.outputs.env_flags }} \
            ${{ steps.cfg.outputs.smoke_env }} \
            ${{ steps.cfg.outputs.secret_flags }} \
            "${{ steps.cfg.outputs.image }}"

          # Wait up to 90s for the declared port to respond.
          for i in $(seq 1 45); do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 2 "http://127.0.0.1:${{ steps.cfg.outputs.port }}${{ steps.cfg.outputs.health }}" 2>/dev/null || echo "000")
            case "$code" in
              2*|3*)
                echo "✓ ${{ matrix.slug }} responded $code on :${{ steps.cfg.outputs.port }}${{ steps.cfg.outputs.health }}"
                exit 0
                ;;
            esac
            sleep 2
          done

          echo "::error::${{ matrix.slug }} did not become healthy within 90s"
          echo "── container state ──"
          docker inspect "$NAME" --format '{{.State.Status}} (exit {{.State.ExitCode}}): {{.State.Error}}' 2>&1 || true
          echo "── container logs ──"
          docker logs "$NAME" 2>&1 | tail -80 || true
          exit 1

      - name: Cleanup container
        if: always()
        run: |
          NAME="probe-${{ matrix.slug }}"
          NAME=${NAME//\//-}
          docker rm -f "$NAME" 2>/dev/null || true
